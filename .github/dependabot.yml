version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:00"
      timezone: "Etc/UTC"
    labels:
      - "dependencies"
      - "ci"
      - "security"
    open-pull-requests-limit: 3
    groups:
      github-actions-runtime:
        applies-to: "version-updates"
        patterns:
          - "actions/*"
          - "astral-sh/*"
        update-types:
          - "minor"
          - "patch"
    commit-message:
      prefix: "chore(deps)"

  - package-ecosystem: "bun"
    directory: "/apps/ts"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:15"
      timezone: "Etc/UTC"
    labels:
      - "dependencies"
      - "ts"
      - "security"
    open-pull-requests-limit: 5
    groups:
      ts-toolchain:
        applies-to: "version-updates"
        patterns:
          - "@biomejs/*"
          - "bun-types"
          - "typescript"
          - "vite"
          - "@vitejs/*"
          - "vitest"
          - "@vitest/*"
          - "happy-dom"
          - "@testing-library/*"
          - "@playwright/*"
          - "tailwindcss"
          - "@tailwindcss/*"
          - "openapi-typescript"
        update-types:
          - "minor"
          - "patch"
      ts-react-runtime:
        applies-to: "version-updates"
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
          - "@tanstack/*"
          - "@radix-ui/*"
        update-types:
          - "minor"
          - "patch"
      ts-ui-runtime:
        applies-to: "version-updates"
        patterns:
          - "@monaco-editor/*"
          - "monaco-editor"
          - "class-variance-authority"
          - "clsx"
          - "js-yaml"
          - "@types/js-yaml"
          - "lightweight-charts"
          - "lucide-react"
          - "tailwind-merge"
          - "zod"
          - "zustand"
        update-types:
          - "minor"
          - "patch"
    commit-message:
      prefix: "chore(deps)"

  - package-ecosystem: "uv"
    directory: "/apps/bt"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:30"
      timezone: "Etc/UTC"
    labels:
      - "dependencies"
      - "bt"
      - "security"
    open-pull-requests-limit: 5
    groups:
      bt-dev-tools:
        applies-to: "version-updates"
        patterns:
          - "mypy"
          - "pandas-stubs"
          - "pyright"
          - "pytest*"
          - "respx"
          - "ruff"
        update-types:
          - "minor"
          - "patch"
      bt-server-runtime:
        applies-to: "version-updates"
        patterns:
          - "duckdb"
          - "fastapi"
          - "httpx"
          - "loguru"
          - "pydantic"
          - "rich"
          - "ruamel.yaml"
          - "sqlalchemy"
          - "sse-starlette"
          - "typer"
          - "uvicorn*"
        update-types:
          - "minor"
          - "patch"
      bt-research-runtime:
        applies-to: "version-updates"
        patterns:
          - "lightgbm"
          - "nautilus-trader"
          - "numpy"
          - "optuna"
          - "pandas"
          - "scikit-learn"
          - "scipy"
          - "vectorbt"
        update-types:
          - "minor"
          - "patch"
    commit-message:
      prefix: "chore(deps)"

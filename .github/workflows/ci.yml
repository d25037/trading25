name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  BUN_VERSION: "1.3.14"
  BUN_ARCHIVE_SHA256: "951ee2aee855f08595aeec6225226a298d3fea83a3dcd6465c09cbccdf7e848f"
  UV_VERSION: "0.11.29"
  GITLEAKS_VERSION: "8.30.1"
  GITLEAKS_IMAGE_DIGEST: "sha256:c00b6bd0aeb3071cbcb79009cb16a60dd9e0a7c60e2be9ab65d25e6bc8abbb7f"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      product_ci: ${{ steps.scope.outputs.product_ci }}
      research_ci: ${{ steps.scope.outputs.research_ci }}
      contracts_ci: ${{ steps.scope.outputs.contracts_ci }}
      security_ci: ${{ steps.scope.outputs.security_ci }}
      docs_only: ${{ steps.scope.outputs.docs_only }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Determine changed files
        id: changed
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.sha }}" > /tmp/changed-files.txt
          elif [[ -n "${{ github.event.before }}" && "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]]; then
            git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" > /tmp/changed-files.txt
          else
            git ls-files > /tmp/changed-files.txt
          fi
          cat /tmp/changed-files.txt
      - name: Classify CI scope
        id: scope
        run: |
          set -o pipefail
          python scripts/ci/changed-scope.py < /tmp/changed-files.txt | tee /tmp/ci-scope.txt
          cat /tmp/ci-scope.txt >> "$GITHUB_OUTPUT"

  maintainability-python39:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.9"
      - name: Verify Python 3.9 fail-fast guard
        shell: bash
        run: |
          set +e
          python scripts/maintainability_snapshot.py --root . >/tmp/maintainability-stdout.txt 2>/tmp/maintainability-stderr.txt
          status=$?
          set -e
          test "${status}" -eq 2
          test ! -s /tmp/maintainability-stdout.txt
          expected='maintainability_snapshot.py requires Python >=3.12. Run: uv run --project apps/bt python scripts/maintainability_snapshot.py ...'
          test "$(cat /tmp/maintainability-stderr.txt)" = "${expected}"

  maintainability:
    needs: maintainability-python39
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Check maintainability snapshot
        run: python scripts/maintainability_snapshot.py --root . --json-out docs/maintainability-snapshot-latest.json --md-out docs/maintainability-snapshot-latest.md --check

  repo-guardrails:
    needs: changes
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: Audit codex skills
        run: python scripts/skills/audit_skills.py --strict-legacy
      - name: Check privacy leaks
        run: python scripts/check-privacy-leaks.py

  quality:
    needs: changes
    if: needs.changes.outputs.product_ci == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Install Bun
        run: |
          bun_archive="${RUNNER_TEMP}/bun-linux-x64.zip"
          bun_extract="${RUNNER_TEMP}/bun-extract"
          BUN_INSTALL="${RUNNER_TEMP}/bun-install"
          curl -fsSL --retry 3 -o "${bun_archive}" \
            "https://github.com/oven-sh/bun/releases/download/bun-v${BUN_VERSION}/bun-linux-x64.zip"
          echo "${BUN_ARCHIVE_SHA256}  ${bun_archive}" | sha256sum -c -
          unzip -q "${bun_archive}" -d "${bun_extract}"
          mkdir -p "${BUN_INSTALL}/bin"
          install -m 0755 "${bun_extract}/bun-linux-x64/bun" "${BUN_INSTALL}/bin/bun"
          ln -sfn bun "${BUN_INSTALL}/bin/bunx"
          export BUN_INSTALL
          export PATH="${BUN_INSTALL}/bin:${PATH}"
          echo "${BUN_INSTALL}/bin" >> "$GITHUB_PATH"
          echo "BUN_INSTALL=${BUN_INSTALL}" >> "$GITHUB_ENV"
          "${BUN_INSTALL}/bin/bun" --version
          "${BUN_INSTALL}/bin/bunx" --version
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: ${{ env.UV_VERSION }}
      - name: Install deps (apps/ts)
        run: bun install --frozen-lockfile
        working-directory: apps/ts
      - name: Install deps (apps/bt)
        run: uv sync --locked
        working-directory: apps/bt
      - name: Lint
        run: ./scripts/lint.sh
      - name: Typecheck
        run: ./scripts/typecheck.sh

  contract-tests:
    needs: changes
    if: needs.changes.outputs.product_ci == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Install Bun
        run: |
          bun_archive="${RUNNER_TEMP}/bun-linux-x64.zip"
          bun_extract="${RUNNER_TEMP}/bun-extract"
          BUN_INSTALL="${RUNNER_TEMP}/bun-install"
          curl -fsSL --retry 3 -o "${bun_archive}" \
            "https://github.com/oven-sh/bun/releases/download/bun-v${BUN_VERSION}/bun-linux-x64.zip"
          echo "${BUN_ARCHIVE_SHA256}  ${bun_archive}" | sha256sum -c -
          unzip -q "${bun_archive}" -d "${bun_extract}"
          mkdir -p "${BUN_INSTALL}/bin"
          install -m 0755 "${bun_extract}/bun-linux-x64/bun" "${BUN_INSTALL}/bin/bun"
          ln -sfn bun "${BUN_INSTALL}/bin/bunx"
          export BUN_INSTALL
          export PATH="${BUN_INSTALL}/bin:${PATH}"
          echo "${BUN_INSTALL}/bin" >> "$GITHUB_PATH"
          echo "BUN_INSTALL=${BUN_INSTALL}" >> "$GITHUB_ENV"
          "${BUN_INSTALL}/bin/bun" --version
          "${BUN_INSTALL}/bin/bunx" --version
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: ${{ env.UV_VERSION }}
      - name: Install deps (apps/ts)
        run: bun install --frozen-lockfile
        working-directory: apps/ts
      - name: Install deps (apps/bt)
        run: uv sync --locked
        working-directory: apps/bt
      - name: Test TypeScript wire duplicate gate
        run: uv run pytest tests/unit/scripts/test_check_ts_wire_contracts.py -q
        working-directory: apps/bt
      - name: Materialize base OpenAPI snapshot
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          git show "${BASE_SHA}:apps/ts/packages/contracts/openapi/bt-openapi.json" > /tmp/bt-openapi-base.json
      - name: Run contract sync checks
        run: ./scripts/check-contract-sync.sh
        env:
          OPENAPI_BASE_SNAPSHOT: ${{ github.event_name == 'pull_request' && '/tmp/bt-openapi-base.json' || '' }}

  golden-dataset-regression:
    needs: changes
    if: needs.changes.outputs.product_ci == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Install Bun
        run: |
          bun_archive="${RUNNER_TEMP}/bun-linux-x64.zip"
          bun_extract="${RUNNER_TEMP}/bun-extract"
          BUN_INSTALL="${RUNNER_TEMP}/bun-install"
          curl -fsSL --retry 3 -o "${bun_archive}" \
            "https://github.com/oven-sh/bun/releases/download/bun-v${BUN_VERSION}/bun-linux-x64.zip"
          echo "${BUN_ARCHIVE_SHA256}  ${bun_archive}" | sha256sum -c -
          unzip -q "${bun_archive}" -d "${bun_extract}"
          mkdir -p "${BUN_INSTALL}/bin"
          install -m 0755 "${bun_extract}/bun-linux-x64/bun" "${BUN_INSTALL}/bin/bun"
          ln -sfn bun "${BUN_INSTALL}/bin/bunx"
          export BUN_INSTALL
          export PATH="${BUN_INSTALL}/bin:${PATH}"
          echo "${BUN_INSTALL}/bin" >> "$GITHUB_PATH"
          echo "BUN_INSTALL=${BUN_INSTALL}" >> "$GITHUB_ENV"
          "${BUN_INSTALL}/bin/bun" --version
          "${BUN_INSTALL}/bin/bunx" --version
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: ${{ env.UV_VERSION }}
      - name: Install deps (apps/bt)
        run: uv sync --locked
        working-directory: apps/bt
      - name: Run golden dataset regression tests
        run: ./scripts/test-golden-regression.sh

  coverage-gate:
    if: needs.changes.outputs.product_ci == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 40
    needs:
      - changes
      - package-unit-tests
      - app-integration-tests
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Install Bun
        run: |
          bun_archive="${RUNNER_TEMP}/bun-linux-x64.zip"
          bun_extract="${RUNNER_TEMP}/bun-extract"
          BUN_INSTALL="${RUNNER_TEMP}/bun-install"
          curl -fsSL --retry 3 -o "${bun_archive}" \
            "https://github.com/oven-sh/bun/releases/download/bun-v${BUN_VERSION}/bun-linux-x64.zip"
          echo "${BUN_ARCHIVE_SHA256}  ${bun_archive}" | sha256sum -c -
          unzip -q "${bun_archive}" -d "${bun_extract}"
          mkdir -p "${BUN_INSTALL}/bin"
          install -m 0755 "${bun_extract}/bun-linux-x64/bun" "${BUN_INSTALL}/bin/bun"
          ln -sfn bun "${BUN_INSTALL}/bin/bunx"
          export BUN_INSTALL
          export PATH="${BUN_INSTALL}/bin:${PATH}"
          echo "${BUN_INSTALL}/bin" >> "$GITHUB_PATH"
          echo "BUN_INSTALL=${BUN_INSTALL}" >> "$GITHUB_ENV"
          "${BUN_INSTALL}/bin/bun" --version
          "${BUN_INSTALL}/bin/bunx" --version
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: ${{ env.UV_VERSION }}
      - name: Install deps (apps/ts)
        run: bun install --frozen-lockfile
        working-directory: apps/ts
      - name: Install deps (apps/bt)
        run: uv sync --locked
        working-directory: apps/bt
      - name: Download bt coverage artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: bt-coverage-*
          path: /tmp/bt-coverage
          merge-multiple: true
      - name: Run coverage gate
        run: ./scripts/coverage-gate.sh
        env:
          CI_DEPS_READY: "1"
          BT_COVERAGE_INPUT_DIR: /tmp/bt-coverage

  package-unit-tests:
    needs: changes
    if: needs.changes.outputs.product_ci == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: ${{ env.UV_VERSION }}
      - name: Install deps (apps/bt)
        run: uv sync --locked
        working-directory: apps/bt
      - name: Run package unit tests
        run: ./scripts/test-packages.sh
        env:
          CI_DEPS_READY: "1"
          SKIP_TS_TESTS: "1"
          BT_COVERAGE_DATA_FILE: ".coverage.unit"
          BT_UNIT_TEST_SHARDS: "3"
      - name: Upload bt coverage artifact (unit)
        if: success()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bt-coverage-unit
          path: apps/bt/.coverage.unit
          include-hidden-files: true
          if-no-files-found: error

  market-v4-darwin-capabilities:
    needs: changes
    if: needs.changes.outputs.product_ci == 'true'
    runs-on: macos-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: ${{ env.UV_VERSION }}
      - name: Install deps (apps/bt)
        run: uv sync --locked
        working-directory: apps/bt
      - name: Run Market v4 Darwin capability tests
        run: uv run pytest -m darwin_capability
        working-directory: apps/bt

  app-integration-tests:
    needs: changes
    if: needs.changes.outputs.product_ci == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: ${{ env.UV_VERSION }}
      - name: Install deps (apps/bt)
        run: uv sync --locked
        working-directory: apps/bt
      - name: Run app integration tests
        run: ./scripts/test-apps.sh
        env:
          CI_DEPS_READY: "1"
          SKIP_TS_TESTS: "1"
          BT_COVERAGE_DATA_FILE: ".coverage.app"
      - name: Upload bt coverage artifact (app)
        if: success()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bt-coverage-app
          path: apps/bt/.coverage.app
          include-hidden-files: true
          if-no-files-found: error

  ts-tests:
    needs: changes
    if: needs.changes.outputs.product_ci == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Install Bun
        run: |
          bun_archive="${RUNNER_TEMP}/bun-linux-x64.zip"
          bun_extract="${RUNNER_TEMP}/bun-extract"
          BUN_INSTALL="${RUNNER_TEMP}/bun-install"
          curl -fsSL --retry 3 -o "${bun_archive}" \
            "https://github.com/oven-sh/bun/releases/download/bun-v${BUN_VERSION}/bun-linux-x64.zip"
          echo "${BUN_ARCHIVE_SHA256}  ${bun_archive}" | sha256sum -c -
          unzip -q "${bun_archive}" -d "${bun_extract}"
          mkdir -p "${BUN_INSTALL}/bin"
          install -m 0755 "${bun_extract}/bun-linux-x64/bun" "${BUN_INSTALL}/bin/bun"
          ln -sfn bun "${BUN_INSTALL}/bin/bunx"
          export BUN_INSTALL
          export PATH="${BUN_INSTALL}/bin:${PATH}"
          echo "${BUN_INSTALL}/bin" >> "$GITHUB_PATH"
          echo "BUN_INSTALL=${BUN_INSTALL}" >> "$GITHUB_ENV"
          "${BUN_INSTALL}/bin/bun" --version
          "${BUN_INSTALL}/bin/bunx" --version
      - name: Install deps (apps/ts)
        run: bun install --frozen-lockfile
        working-directory: apps/ts
      - name: Build TypeScript workspace
        working-directory: apps/ts
        run: bun run workspace:build
      - name: Build Shikiho extension
        working-directory: apps/ts
        run: bun run extension:build
      - name: Run TypeScript workspace tests
        working-directory: apps/ts
        run: bun run workspace:test

  secret-scan:
    needs: changes
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Run secret scan (gitleaks)
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            log_opts="${{ github.event.pull_request.base.sha }}..${{ github.sha }}"
          elif [[ -n "${{ github.event.before }}" && "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]]; then
            log_opts="${{ github.event.before }}..${{ github.sha }}"
          else
            log_opts="-1 ${{ github.sha }}"
          fi
          docker run --rm -v "${GITHUB_WORKSPACE}:/repo" \
            "ghcr.io/gitleaks/gitleaks:v${GITLEAKS_VERSION}@${GITLEAKS_IMAGE_DIGEST}" \
            git "/repo" --config="/repo/.gitleaks.toml" \
            --log-opts="${log_opts}" --redact --verbose

  dependency-vulnerability-audit:
    needs: changes
    if: needs.changes.outputs.security_ci == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Install Bun
        run: |
          bun_archive="${RUNNER_TEMP}/bun-linux-x64.zip"
          bun_extract="${RUNNER_TEMP}/bun-extract"
          BUN_INSTALL="${RUNNER_TEMP}/bun-install"
          curl -fsSL --retry 3 -o "${bun_archive}" \
            "https://github.com/oven-sh/bun/releases/download/bun-v${BUN_VERSION}/bun-linux-x64.zip"
          echo "${BUN_ARCHIVE_SHA256}  ${bun_archive}" | sha256sum -c -
          unzip -q "${bun_archive}" -d "${bun_extract}"
          mkdir -p "${BUN_INSTALL}/bin"
          install -m 0755 "${bun_extract}/bun-linux-x64/bun" "${BUN_INSTALL}/bin/bun"
          ln -sfn bun "${BUN_INSTALL}/bin/bunx"
          export BUN_INSTALL
          export PATH="${BUN_INSTALL}/bin:${PATH}"
          echo "${BUN_INSTALL}/bin" >> "$GITHUB_PATH"
          echo "BUN_INSTALL=${BUN_INSTALL}" >> "$GITHUB_ENV"
          "${BUN_INSTALL}/bin/bun" --version
          "${BUN_INSTALL}/bin/bunx" --version
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: ${{ env.UV_VERSION }}
      - name: Install deps (apps/ts)
        run: bun install --frozen-lockfile
        working-directory: apps/ts
      - name: Audit Bun dependencies
        run: bun audit --audit-level=moderate
        working-directory: apps/ts
      - name: Audit Python dependencies (pip-audit)
        run: >
          uv run --locked --with pip-audit pip-audit
          --ignore-vuln CVE-2026-4539
          --ignore-vuln CVE-2026-3219
        working-directory: apps/bt

  bt-research-tests:
    needs: changes
    if: needs.changes.outputs.research_ci == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: ${{ env.UV_VERSION }}
      - name: Install deps (apps/bt)
        run: uv sync --locked
        working-directory: apps/bt
      - name: Determine changed research files
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.sha }}" > /tmp/research-changed-files.txt
          elif [[ -n "${{ github.event.before }}" && "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]]; then
            git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" > /tmp/research-changed-files.txt
          else
            : > /tmp/research-changed-files.txt
          fi
          cat /tmp/research-changed-files.txt
      - name: Check research guardrails
        run: python scripts/check-research-guardrails.py
      - name: Lint changed research Python
        run: |
          python scripts/ci/research-test-targets.py --mode py-files < /tmp/research-changed-files.txt > /tmp/research-python-files.txt
          if [[ -s /tmp/research-python-files.txt ]]; then
            uv run --project apps/bt ruff check $(cat /tmp/research-python-files.txt)
          else
            echo "No changed research Python files to lint."
          fi
      - name: Run bt research unit tests
        run: |
          python scripts/ci/research-test-targets.py < /tmp/research-changed-files.txt > /tmp/research-test-targets.txt
          if [[ -s /tmp/research-test-targets.txt ]]; then
            ./scripts/bt-pytest.sh $(cat /tmp/research-test-targets.txt)
          else
            echo "No mapped research pytest targets for this change."
          fi
        env:
          BT_PYTEST_FAST: "1"

  web-e2e:
    if: >
      ${{
        always() &&
        github.event_name == 'pull_request' &&
        needs.changes.outputs.product_ci == 'true' &&
        !contains(needs.*.result, 'failure') &&
        !contains(needs.*.result, 'cancelled')
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs:
      - changes
      - maintainability
      - maintainability-python39
      - repo-guardrails
      - quality
      - contract-tests
      - golden-dataset-regression
      - coverage-gate
      - package-unit-tests
      - market-v4-darwin-capabilities
      - app-integration-tests
      - ts-tests
      - secret-scan
      - dependency-vulnerability-audit
      - bt-research-tests
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Install Bun
        run: |
          bun_archive="${RUNNER_TEMP}/bun-linux-x64.zip"
          bun_extract="${RUNNER_TEMP}/bun-extract"
          BUN_INSTALL="${RUNNER_TEMP}/bun-install"
          curl -fsSL --retry 3 -o "${bun_archive}" \
            "https://github.com/oven-sh/bun/releases/download/bun-v${BUN_VERSION}/bun-linux-x64.zip"
          echo "${BUN_ARCHIVE_SHA256}  ${bun_archive}" | sha256sum -c -
          unzip -q "${bun_archive}" -d "${bun_extract}"
          mkdir -p "${BUN_INSTALL}/bin"
          install -m 0755 "${bun_extract}/bun-linux-x64/bun" "${BUN_INSTALL}/bin/bun"
          ln -sfn bun "${BUN_INSTALL}/bin/bunx"
          export BUN_INSTALL
          export PATH="${BUN_INSTALL}/bin:${PATH}"
          echo "${BUN_INSTALL}/bin" >> "$GITHUB_PATH"
          echo "BUN_INSTALL=${BUN_INSTALL}" >> "$GITHUB_ENV"
          "${BUN_INSTALL}/bin/bun" --version
          "${BUN_INSTALL}/bin/bunx" --version
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: ${{ env.UV_VERSION }}
      - name: Install deps (apps/ts)
        run: bun install --frozen-lockfile
        working-directory: apps/ts
      - name: Install deps (apps/bt)
        run: uv sync --locked
        working-directory: apps/bt
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('apps/ts/packages/web/package.json', 'apps/ts/bun.lock') }}
      - name: Install Playwright browser (Chromium)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: bunx --bun playwright install chromium
        working-directory: apps/ts/packages/web
      - name: Start bt server for web e2e
        run: |
          uv run bt server --port 3002 > /tmp/bt-server.log 2>&1 &
          echo $! > /tmp/bt-server.pid
          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:3002/api/health > /dev/null; then
              echo "bt server is ready"
              exit 0
            fi
            sleep 1
          done
          echo "bt server failed to start"
          cat /tmp/bt-server.log
          exit 1
        working-directory: apps/bt
      - name: Run web e2e smoke tests
        run: bun run --filter @trading25/web e2e:smoke
        working-directory: apps/ts
      - name: Stop bt server
        if: always()
        run: |
          if [[ -f /tmp/bt-server.pid ]]; then
            kill "$(cat /tmp/bt-server.pid)" || true
          fi
      - name: Upload Playwright reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-report
          path: |
            apps/ts/packages/web/playwright-report
            apps/ts/packages/web/test-results
          if-no-files-found: ignore

  ci-gate:
    if: always()
    runs-on: ubuntu-latest
    needs:
      - changes
      - maintainability
      - maintainability-python39
      - repo-guardrails
      - quality
      - contract-tests
      - golden-dataset-regression
      - coverage-gate
      - package-unit-tests
      - market-v4-darwin-capabilities
      - app-integration-tests
      - ts-tests
      - secret-scan
      - dependency-vulnerability-audit
      - bt-research-tests
      - web-e2e
    steps:
      - name: Verify required CI jobs
        env:
          NEEDS_JSON: ${{ toJSON(needs) }}
        run: |
          python - <<'PY'
          import json
          import os
          import sys

          needs = json.loads(os.environ["NEEDS_JSON"])
          scope_names = (
              "product_ci",
              "research_ci",
              "contracts_ci",
              "security_ci",
              "docs_only",
          )
          try:
              scope = needs["changes"]["outputs"]
              invalid_scope = {
                  name: scope.get(name)
                  for name in scope_names
                  if scope.get(name) not in {"true", "false"}
              }
          except (KeyError, TypeError) as error:
              print(f"CI scope outputs are missing or malformed: {error}")
              sys.exit(1)
          if invalid_scope:
              print(f"CI scope outputs are missing or malformed: {invalid_scope}")
              sys.exit(1)

          blocked = {
              name: dependency["result"]
              for name, dependency in needs.items()
              if dependency["result"] in {"failure", "cancelled"}
          }
          if blocked:
              print(f"CI dependencies failed or were cancelled: {blocked}")
              sys.exit(1)

          product_ci = scope["product_ci"] == "true"
          required_jobs = {
              "changes",
              "maintainability",
              "maintainability-python39",
              *(
                  (
                      "quality",
                      "golden-dataset-regression",
                      "coverage-gate",
                      "package-unit-tests",
                      "market-v4-darwin-capabilities",
                      "app-integration-tests",
                      "ts-tests",
                  )
                  if product_ci
                  else ()
              ),
              "repo-guardrails",
              "secret-scan",
              *(("contract-tests",) if product_ci else ()),
              *(
                  ("dependency-vulnerability-audit",)
                  if scope["security_ci"] == "true"
                  else ()
              ),
              *(("bt-research-tests",) if scope["research_ci"] == "true" else ()),
              *(
                  ("web-e2e",)
                  if product_ci and os.environ.get("GITHUB_EVENT_NAME") == "pull_request"
                  else ()
              ),
          }
          incomplete = {
              name: needs[name]["result"]
              for name in required_jobs
              if needs[name]["result"] != "success"
          }
          if incomplete:
              print(f"Required CI jobs did not succeed: {incomplete}")
              sys.exit(1)

          if product_ci:
              print("All required product CI jobs succeeded.")
          else:
              print("Product CI was intentionally skipped by path filtering.")
          PY

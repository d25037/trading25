name: Nautilus Smoke

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - .github/workflows/nautilus-smoke.yml
      - apps/bt/pyproject.toml
      - apps/bt/uv.lock
      - apps/bt/src/**
      - apps/bt/tests/conftest.py
      - apps/bt/tests/smoke/test_nautilus_runtime_smoke.py
      - scripts/bt-run.sh
      - scripts/test-nautilus-smoke.sh
  workflow_dispatch:

permissions:
  contents: read

env:
  UV_VERSION: "0.11.29"

concurrency:
  group: nautilus-smoke-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  nautilus-real-runtime-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: ${{ env.UV_VERSION }}
      - name: Install deps (apps/bt + nautilus)
        run: uv sync --locked --group nautilus
        working-directory: apps/bt
      - name: Run Nautilus real-runtime smoke
        run: ./scripts/test-nautilus-smoke.sh
        env:
          NAUTILUS_SMOKE_REQUIRE_RUNTIME: "1"

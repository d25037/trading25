name: Research Promotion CI

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  UV_VERSION: "0.11.31"

concurrency:
  group: research-promotion-${{ github.ref }}
  cancel-in-progress: true

jobs:
  research-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3, 4, 5]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@c771a70e6277c0a99b617c7a806ffedaca235ff9 # v9.0.0
        with:
          working-directory: apps/bt
          version: ${{ env.UV_VERSION }}
          enable-cache: true
          prune-cache: true
          restore-cache: true
          save-cache: false
      - name: Install deps (apps/bt)
        run: uv sync --locked
        working-directory: apps/bt
      - name: Check research guardrails
        run: python scripts/check-research-guardrails.py
      - name: Run promotion research tests
        env:
          RESEARCH_SHARD_INDEX: ${{ matrix.shard }}
          RESEARCH_SHARD_COUNT: "6"
          BT_PYTEST_FAST: "1"
        run: |
          printf '%s\n' \
            tests/unit/domains/analytics \
            tests/unit/scripts \
            > /tmp/research-test-targets.txt
          python scripts/ci/research-test-targets.py \
            --mode shard \
            --shard-index "${RESEARCH_SHARD_INDEX}" \
            --shard-count "${RESEARCH_SHARD_COUNT}" \
            < /tmp/research-test-targets.txt \
            > /tmp/research-shard-test-targets.txt
          mapfile -t research_test_targets < /tmp/research-shard-test-targets.txt
          ./scripts/bt-pytest.sh "${research_test_targets[@]}"

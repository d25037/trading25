display_name: Market v4 Cutover Smoke
description: >
  Minimal market-backed production strategy used by the Market v4 semantic
  smoke workflow. It intentionally avoids optional fundamentals and margin
  inputs so the smoke isolates data-plane and API availability.

shared_config:
  data_source: market
  universe_preset: primeMarket
  static_universe: false
  execution_policy:
    mode: standard

entry_filter_params:
  buy_and_hold:
    enabled: true

exit_trigger_params: {}

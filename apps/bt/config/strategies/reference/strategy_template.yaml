# 戦略テンプレート設定

# Optional: デフォルト設定（default.yaml）を戦略ごとにオーバーライド可能
# 戦略固有の実行環境設定を行いたい場合は、以下の shared_config セクションを有効化してください
# shared_config:
#   initial_cash: 20000000  # 初期資金を2000万円に変更
#   dataset: "topix100-A"  # データベースを変更
#   kelly_fraction: 1.0  # Kelly係数を変更（0.5=Half Kelly, 1.0=Full Kelly, 2.0=Double Kelly）
#   fees: 0.0005  # 取引手数料を変更
#   min_allocation: 0.02  # 最小配分率を変更
#   max_allocation: 0.4  # 最大配分率を変更
#   execution_policy:
#     mode: "next_session_round_trip"  # 翌営業日Openで建て、同日Closeで閉じる
#   execution_policy:
#     mode: "current_session_round_trip"  # 当日寄りで建て、当日Closeで閉じる current-session 実行
#   execution_policy:
#     mode: "overnight_round_trip"  # 当日Closeで建て、翌営業日Openで閉じる overnight 実行
#
# 注意:
# - shared_config セクションを省略した場合は、default.yaml の設定が使用されます
# - 一部のパラメータのみを override することも可能です（他は default.yaml の値を維持）
# - バックテスト実行時と最適化実行時の両方で適用されます

entry_filter_params:
  # 期間極値ブレイクシグナル
  period_extrema_break:
    enabled: false
    direction: "high" # 方向（"high"=最高値比較、"low"=最安値比較）
    period: 200 # 比較対象期間（N日最高値/最安値）
    lookback_days: 1 # イベント検出期間（1=当日のみ、N=直近N日以内）

  # 期間極値位置シグナル
  period_extrema_position:
    enabled: false
    direction: "high" # 方向（"high"=最高値比較、"low"=最安値比較）
    state: "at_extrema" # 状態（"at_extrema"=期間高値/安値圏、"away_from_extrema"=圏外）
    period: 200 # 比較対象期間（N日最高値/最安値）
    lookback_days: 1 # 状態判定期間（1=当日のみ、N=直近N日以内）

  # 基準線クロスシグナル
  baseline_cross:
    enabled: false
    baseline_type: "sma" # 基準線タイプ（"sma"/"ema"/"vwema"）
    baseline_period: 200 # 基準線期間
    direction: "above" # 方向（"above"=上抜け、"below"=下抜け）
    lookback_days: 1 # 検出期間（1=その日のみ、N=直近N日以内）
    price_column: "close" # 判定価格カラム（"close"/"high"/"low"）

  # クロスオーバーシグナル（SMA/RSI/MACD/EMA）
  crossover:
    enabled: false
    type: "sma" # 指標タイプ（"sma"/"rsi"/"macd"/"ema"）
    direction: "golden" # クロス方向（"golden"=ゴールデンクロス、"dead"=デッドクロス）
    fast_period: 10 # 高速線期間
    slow_period: 30 # 低速線期間
    signal_period: 9 # MACDシグナル期間（type=macd時のみ使用）
    lookback_days: 1 # クロス検出期間（1=その日のみ、N=直近N日以内）

  # 基準線乖離シグナル
  baseline_deviation:
    enabled: false
    baseline_type: "sma" # 基準線タイプ（"sma"/"ema"/"vwema"）
    baseline_period: 25 # 基準線期間
    deviation_threshold: 0.2 # 乖離率閾値（0.2 = 20%乖離）
    direction: "below" # 乖離方向（"below"=基準線より安い、"above"=基準線より高い）

  # 基準線位置シグナル
  baseline_position:
    enabled: false
    baseline_type: "sma" # 基準線タイプ（"sma"/"ema"/"vwema"）
    baseline_period: 25 # 基準線期間
    price_column: "close" # 判定価格カラム（"close"/"high"/"low"）
    direction: "above" # 位置方向（"above"=基準線より上、"below"=基準線より下）

  # ボリンジャーバンド位置シグナル
  bollinger_position:
    enabled: false
    window: 20 # ボリンジャーバンド期間
    alpha: 2.0 # 標準偏差倍率（2.0 = 2σ）
    level: "lower" # 判定水準（"upper"/"middle"/"lower"）
    direction: "below" # 方向（"above"/"below"）

  # ボリンジャーバンドクロスシグナル
  bollinger_cross:
    enabled: false
    window: 20 # ボリンジャーバンド期間
    alpha: 2.0 # 標準偏差倍率（2.0 = 2σ）
    level: "middle" # 判定水準（"upper"/"middle"/"lower"）
    direction: "above" # 方向（"above"/"below"）
    lookback_days: 1 # クロス検出期間

  # ATRサポート位置シグナル
  atr_support_position:
    enabled: false
    direction: "below" # 方向（"below"=サポートライン下側、"above"=上側）
    lookback_period: 20 # サポートライン・ATR両方の計算期間（統一期間）
    atr_multiplier: 2.0 # ATR倍率
    price_column: "close" # 判定価格カラム（"close"/"low"）

  # ATRサポートクロスシグナル
  atr_support_cross:
    enabled: false
    direction: "above" # 方向（"below"=下抜け、"above"=上抜け）
    lookback_period: 20 # サポートライン・ATR両方の計算期間（統一期間）
    atr_multiplier: 2.0 # ATR倍率
    lookback_days: 1 # クロス検出期間
    price_column: "close" # 判定価格カラム（"close"/"low"）

  # RSI閾値シグナル
  rsi_threshold:
    enabled: false
    period: 5
    threshold: 10.0
    condition: "below"

  # RSIスプレッドシグナル
  rsi_spread:
    enabled: false
    fast_period: 9 # 短期RSI期間
    slow_period: 14 # 長期RSI期間
    threshold: 10.0 # スプレッド閾値（0-100）
    condition: "above" # above=短期RSI>長期RSI+閾値（上昇モメンタム強）

  # 出来高比率上抜けシグナル
  volume_ratio_above:
    enabled: true # 出来高フィルター有効化
    ratio_threshold: 1.5 # 出来高倍率閾値（短期MA / 長期MA）
    short_period: 20 # 出来高短期平均期間
    long_period: 100 # 出来高長期平均期間
    ma_type: "sma" # 移動平均タイプ（"sma"/"ema"）

  # 出来高比率下抜けシグナル
  volume_ratio_below:
    enabled: false
    ratio_threshold: 0.7 # 出来高倍率閾値（短期MA / 長期MA）
    short_period: 20
    long_period: 100
    ma_type: "sma"

  # 信用残高シグナル
  margin:
    enabled: false
    lookback_period: 150 # 信用残高参照期間
    percentile_threshold: 0.5 # 下位パーセンタイル閾値

  # 財務指標シグナル
  fundamental:
    per:
      enabled: false
      threshold: 10.0 # PER閾値（この値以下で割安判定）
    roe:
      enabled: false
      threshold: 5.0 # ROE閾値（この値以上で高ROE判定）
    forward_eps_growth:
      enabled: false
      threshold: 0.1 # 予想EPS成長率閾値（10%=0.1）
    eps_growth:
      enabled: false
      threshold: 0.1 # EPS成長率閾値（10%=0.1）
      periods: 1 # 比較期間（1=前期比）
    peg_ratio:
      enabled: false
      threshold: 1.0 # PEG Ratio閾値（この値以下で割安成長株判定）
    market_cap:
      enabled: false
      threshold: 100.0 # 時価総額閾値（億円単位）
      condition: "above" # above=大型株選定
      use_floating_shares: true

  # ボラティリティパーセンタイルシグナル
  volatility_percentile:
    enabled: false
    window: 20 # 現在ボラティリティ計算期間
    lookback: 252 # パーセンタイル比較期間
    percentile: 50.0 # 過去分布に対する閾値（0-100）

  # β値シグナル
  beta:
    enabled: false
    lookback_period: 40 # β値計算期間（日数）
    min_beta: 1.0 # β値下限閾値
    max_beta: 3.0 # β値上限閾値

  # 指数前日比シグナル
  index_daily_change:
    enabled: true
    max_daily_change_pct: 1.0 # +1.0%以下の日のみエントリー
    direction: "below"

# Exit Trigger設定（戦略固有exitをOR条件で拡張）
exit_trigger_params:
  # 期間極値位置シグナル
  period_extrema_position:
    enabled: false
    direction: "high" # 方向（"high"=最高値比較、"low"=最安値比較）
    state: "away_from_extrema" # 直近高値/安値圏から離れたらエグジット
    period: 200 # 比較対象期間（N日最高値/最安値）
    lookback_days: 10 # 状態判定期間（10=直近10日間で高値圏を維持できない場合）

  # 期間極値ブレイクシグナル
  period_extrema_break:
    enabled: false
    direction: "low" # 方向（"high"=上抜け、"low"=下抜け）
    period: 50 # 比較対象期間
    lookback_days: 1 # クロス検出期間

  # 基準線クロスシグナル
  baseline_cross:
    enabled: false
    baseline_type: "sma" # 基準線タイプ（"sma"/"ema"/"vwema"）
    baseline_period: 50 # 基準線期間（エグジットは短期推奨）
    direction: "below" # 方向（"above"=上抜け利確、"below"=下抜け損切り）
    lookback_days: 1 # 検出期間（1=その日のみ、N=直近N日以内）
    price_column: "close" # 判定価格カラム（"close"/"high"/"low"）

  # クロスオーバーシグナル（SMA/RSI/MACD/EMA）
  crossover:
    enabled: false
    type: "sma" # 指標タイプ（"sma"/"rsi"/"macd"/"ema"）
    direction: "dead" # クロス方向（"golden"=ゴールデンクロス利確、"dead"=デッドクロス損切り）
    fast_period: 10 # 高速線期間
    slow_period: 30 # 低速線期間
    signal_period: 9 # MACDシグナル期間（type=macd時のみ使用）
    lookback_days: 1 # クロス検出期間（1=その日のみ、N=直近N日以内）

  # 基準線乖離シグナル
  baseline_deviation:
    enabled: false
    baseline_type: "sma" # 基準線タイプ（"sma"/"ema"/"vwema"）
    baseline_period: 25 # 基準線期間
    deviation_threshold: 0.1 # 乖離率閾値（0.1 = 10%オーバーシュートで利確）
    direction: "above" # 乖離方向（"below"=基準線割れ損切り、"above"=基準線超過利確）

  # 基準線位置シグナル
  baseline_position:
    enabled: false
    baseline_type: "sma" # 基準線タイプ（"sma"/"ema"/"vwema"）
    baseline_period: 25 # 基準線期間
    price_column: "close" # 判定価格カラム（"close"/"high"/"low"）
    direction: "above" # 位置方向（"above"=基準線より上、"below"=基準線より下）

  # ボリンジャーバンド位置シグナル
  bollinger_position:
    enabled: false
    window: 20 # ボリンジャーバンド期間
    alpha: 2.0 # 標準偏差倍率（2.0 = 2σ）
    level: "upper" # 判定水準
    direction: "above" # 方向（上限超えで利確など）

  # ボリンジャーバンドクロスシグナル
  bollinger_cross:
    enabled: false
    window: 20 # ボリンジャーバンド期間
    alpha: 2.0 # 標準偏差倍率（2.0 = 2σ）
    level: "middle" # 判定水準
    direction: "below" # 方向（中央線下抜けで損切りなど）
    lookback_days: 1 # クロス検出期間

  # ATRサポート位置シグナル
  atr_support_position:
    enabled: false
    direction: "above" # 方向（"above"=サポート回復、"below"=サポート割れ）
    lookback_period: 20 # サポートライン・ATR両方の計算期間（統一期間）
    atr_multiplier: 2.0 # ATR倍率
    price_column: "close" # 判定価格カラム（"close"/"low"）

  # ATRサポートクロスシグナル
  atr_support_cross:
    enabled: false
    direction: "below" # 方向（"below"=下抜け、"above"=上抜け）
    lookback_period: 20 # サポートライン・ATR両方の計算期間（統一期間）
    atr_multiplier: 2.0 # ATR倍率
    lookback_days: 1 # クロス検出期間
    price_column: "close" # 判定価格カラム（"close"/"low"）

  # RSI閾値シグナル
  rsi_threshold:
    enabled: true
    period: 14 # RSI期間
    threshold: 30.0 # 閾値（0-100）
    condition: "below" # below=閾値より下（売られすぎ）

  # RSIスプレッドシグナル
  rsi_spread:
    enabled: false
    fast_period: 9 # 短期RSI期間
    slow_period: 14 # 長期RSI期間
    threshold: 5.0 # スプレッド閾値（エグジットは小さめ推奨）
    condition: "below" # below=短期RSI<長期RSI-閾値（モメンタム減衰）

  # 出来高比率下抜けシグナル
  volume_ratio_below:
    enabled: true # 出来高フィルター有効化
    ratio_threshold: 1.0 # 出来高倍率閾値（短期MA / 長期MA）
    short_period: 20 # 出来高短期平均期間
    long_period: 100 # 出来高長期平均期間
    ma_type: "sma"

  # 出来高比率上抜けシグナル
  volume_ratio_above:
    enabled: false
    ratio_threshold: 1.5
    short_period: 20
    long_period: 100
    ma_type: "sma"

  # 信用残高シグナル
  margin:
    enabled: false
    lookback_period: 150 # 信用残高参照期間
    percentile_threshold: 0.5 # 下位パーセンタイル閾値

  # 財務指標シグナル
  fundamental:
    per:
      enabled: false
      threshold: 25.0 # PER閾値（この値以上で割高警告）
    roe:
      enabled: false
      threshold: 5.0 # ROE閾値（この値未満で警告）
    forward_eps_growth:
      enabled: false
      threshold: 0.05 # 予想EPS成長率閾値（5%未満で警告）
    eps_growth:
      enabled: false
      threshold: 0.05 # EPS成長率閾値（5%未満で警告）
      periods: 1 # 比較期間（1=前期比）
    peg_ratio:
      enabled: false
      threshold: 2.0 # PEG閾値（この値以上で割高警告）
    market_cap:
      enabled: false
      threshold: 50.0 # 時価総額閾値（億円単位、exit用は低め推奨）
      condition: "below" # below=時価総額縮小で退出
      use_floating_shares: true

  # ボラティリティパーセンタイルシグナル
  volatility_percentile:
    enabled: false
    window: 20 # 現在ボラティリティ計算期間
    lookback: 252 # パーセンタイル比較期間
    percentile: 80.0 # 過去分布に対する閾値（0-100）

  # β値シグナル
  beta:
    enabled: false
    lookback_period: 40 # β値計算期間
    min_beta: 0.5 # β値下限閾値
    max_beta: 2.0 # β値上限閾値

  # 指数前日比シグナル
  index_daily_change:
    enabled: true
    max_daily_change_pct: 1.5 # +1.5%超の日にエグジット
    direction: "above"

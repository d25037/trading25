[experiments."market-behavior/ranking-color-evidence"]
family = "Ranking"
status = "candidate"
decision = "Ranking Individual Stocks の PER/Fwd PER/Fwd P/OP/PBR 色分け判定は Prime-only evidence で始める。絶対値ではなく target-date Prime percentile を基本に使う。PBR/Fwd PER の高位percentileは赤/黄根拠が明確。Fwd PER/PER と Fwd P/OP/PER のrelation percentile単独は置き換え根拠にしないが、低PER前提の Fwd PER/PER <= 0.8x は緑条件として採用し、低PER前提の Fwd P/OP/PER > 1.25x は補助警戒に使う。流動性Zのgreenは3条件に限定し、neutral_rerating は低PER20かつFwd PER/PER <= 0.8のみ green、低PBR20+低Fwd PER20 を blue、低PBR20 only または低PER20かつFwd PER/PER <= 1.0 を light blue、value confirmation なしを gray/neutral とする。crowded_rerating は低PBR20+低Fwd PER20または低PER20かつFwd PER/PER <= 0.8のみ green、中valueあり blue・valueなしyellow。TOPIX 20d<0 の市場調整局面では crowded_rerating の median/tail が大きく悪化するため、配色には直接混ぜず、将来は別の market-adjustment caution overlay として扱う。"
promotedSurface = "Ranking"
riskFlags = ["ui-evidence-layer", "prime-only-judgment", "not-standalone-alpha", "daily-forward-return"]
relatedExperiments = [
  "market-behavior/recent-return-threshold-forward-response",
  "market-behavior/annual-fundamental-confounder-analysis",
